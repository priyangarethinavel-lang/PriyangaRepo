name: "🔐 Service Account Onboarding Request"
description: Request onboarding or configuration of a service account in CIAM/Okta
labels: ["service-account"]
title: "[Service Account] {App Name} | {Environment}"
body:
  - type: markdown
    attributes:
      value: |
        ## Service Account Onboarding Request
        Provide the details below so the CIAM team can onboard or configure the service account in the requested environment(s).

  # ── Service Account Details ─────────────────────────────────────────
  - type: checkboxes
    id: environments
    attributes:
      label: Target Environment(s)
      description: Select all environments where the service account should be onboarded/configured.
      options:
        - label: DEV
        - label: STAGE
        - label: PROD
    validations:
      required: true

  - type: input
    id: application_name
    attributes:
      label: Application Name
      description: The application associated with this service account.
      placeholder: "e.g. MyApp Portal"
    validations:
      required: true

  - type: input
    id: service_account_email_or_upn
    attributes:
      label: Service Account Email / UPN
      description: Provide the service account email address or UPN that needs to be onboarded/configured.
      placeholder: "e.g. svc-myapp@company.com"
    validations:
      required: true

  # ── Service Account Username or PS ID ───────────────────────
  - type: input
    id: service_account_username_or_psid
    attributes:
      label: Service Account Username / PS ID
      description: Provide the exact username or PS ID of the service/process account to be onboarded/configured. This helps uniquely identify the account (e.g., ps123456).
      placeholder: "e.g. ps123456"
    validations:
      required: true

  # ── Additional ──────────────────────────────────────────────────────
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Provide any additional details, requirements, target Okta environment details, entitlement/group details, related tickets, or special instructions.
      placeholder: "e.g. Please onboard this service account for MyApp DEV and STAGE. Required entitlement/group: MYAPP_InternalUsers."
