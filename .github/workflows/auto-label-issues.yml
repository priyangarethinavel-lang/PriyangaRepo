name: Auto-label Issues from Template

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            // Issue Forms strip `type: markdown` blocks from the body, so we
            // can't detect the template via body text. Instead we rely on the
            // label(s) the form itself declares (e.g. labels: ["new-application"]).
            const formLabels = (context.payload.issue.labels || []).map(l => l.name);

            const knownTemplateLabels = new Set([
              'bug',
              'configuration-change',
              'enhancement',
              'triage-needed',
              'group-role',
              'new-application',
              'question',
              'service-account',
              'uat',
            ]);

            const templateLabel = formLabels.find(name => knownTemplateLabels.has(name));
            if (!templateLabel) {
              core.info('No known template label present on issue — skipping.');
              return;
            }

            const fyLabel = `FY${String(new Date().getFullYear()).slice(-2)}`;
            const labelsToApply = [templateLabel, fyLabel];

            // Ensure each label exists in the repo; create it if missing.
            // addLabels() 422s if any label is unknown, and issue-form labels
            // are silently dropped when they don't exist yet.
            for (const name of labelsToApply) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color: 'ededed',
                    description: 'Auto-created by auto-label-issues workflow',
                  });
                  core.info(`Created missing label "${name}".`);
                } else {
                  throw err;
                }
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToApply,
            });

            core.info(`Applied labels "${templateLabel}", "${fyLabel}" to issue #${context.issue.number}`);
